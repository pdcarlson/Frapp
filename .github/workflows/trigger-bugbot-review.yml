name: Trigger Bugbot Review

on:
  pull_request_target:
    branches: [main, production]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  checks: read
  pull-requests: write

jobs:
  bugbot-review:
    # NOTE: this job name is the GitHub status context name. It is required on
    # the `production` branch (see docs/internal/BUGBOT_RUNBOOK.md and
    # scripts/configure-branch-protection.mjs). Do not rename.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request and verify Bugbot review
        uses: actions/github-script@v8
        with:
          script: |
            // Preferred manual trigger. "bugbot run" avoids the "cursor" substring
            // so it cannot be confused with @cursor / @cursoragent mentions, which
            // spawn paid Cursor background agents (distinct product from Bugbot).
            const BUGBOT_TRIGGER_COMMENT = "bugbot run";
            const WORKFLOW_CHECK_NAME = "bugbot-review";
            const POLL_INTERVAL_MS = 15_000;
            const POLL_TIMEOUT_MS = 10 * 60 * 1000;
            // Branches where Bugbot must complete successfully before this job
            // turns green. Everything else is advisory: a Bugbot response in any
            // form (check run OR review comments) passes; absence → warning.
            const STRICT_BRANCHES = new Set(["production"]);
            const BUGBOT_NAME_PATTERN = /(bugbot|cursor)/i;
            const BUGBOT_APP_PATTERN = /cursor/i;
            const BUGBOT_USER_PATTERN = /(bugbot|cursor)/i;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const baseRef = context.payload.pull_request.base.ref;
            const isStrict = STRICT_BRANCHES.has(baseRef);
            const headSha = context.payload.pull_request.head.sha;
            const prNumber = context.payload.pull_request.number;

            function isBugbotCheckRun(checkRun) {
              if (checkRun.name === WORKFLOW_CHECK_NAME) {
                return false;
              }
              const appSlug = checkRun.app?.slug ?? "";
              const appName = checkRun.app?.name ?? "";
              return (
                BUGBOT_NAME_PATTERN.test(checkRun.name) ||
                BUGBOT_APP_PATTERN.test(appSlug) ||
                BUGBOT_APP_PATTERN.test(appName)
              );
            }

            function pickLatest(runs) {
              return [...runs].sort((left, right) => {
                const leftTs = new Date(left.completed_at ?? left.started_at ?? 0).getTime();
                const rightTs = new Date(right.completed_at ?? right.started_at ?? 0).getTime();
                return rightTs - leftTs;
              })[0];
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: BUGBOT_TRIGGER_COMMENT,
            });

            const startedAt = Date.now();

            while (Date.now() - startedAt < POLL_TIMEOUT_MS) {
              // Primary signal: Bugbot emitted a GitHub check run.
              const { data: checkData } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100,
              });
              const bugbotRuns = checkData.check_runs.filter(isBugbotCheckRun);
              const completed = bugbotRuns.filter((run) => run.status === "completed");

              if (completed.length > 0) {
                const latest = pickLatest(completed);
                const conclusion = latest.conclusion ?? "unknown";
                core.info(`Bugbot check '${latest.name}' completed: ${conclusion}.`);
                if (["success", "neutral", "skipped"].includes(conclusion)) {
                  return;
                }
                if (isStrict) {
                  core.setFailed(`Bugbot check '${latest.name}' concluded '${conclusion}'.`);
                  return;
                }
                core.warning(
                  `Bugbot concluded '${conclusion}' on advisory branch '${baseRef}' — not failing.`,
                );
                return;
              }

              if (bugbotRuns.length > 0) {
                core.info(`Bugbot check is still ${bugbotRuns[0].status}.`);
              }

              // Fallback: Bugbot sometimes posts PR review comments instead of a
              // GitHub check run. On advisory branches, treat a Bugbot-authored
              // review submitted since we triggered as sufficient signal.
              if (!isStrict) {
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  per_page: 100,
                });
                const bugbotReview = reviews.find((review) => {
                  const login = review.user?.login ?? "";
                  const submittedAt = new Date(review.submitted_at ?? 0).getTime();
                  // 30s grace: the trigger comment and the review can race on Bugbot's side.
                  return (
                    BUGBOT_USER_PATTERN.test(login) && submittedAt >= startedAt - 30_000
                  );
                });
                if (bugbotReview) {
                  core.info(
                    `Bugbot posted review '${bugbotReview.state}' by @${bugbotReview.user?.login} — advisory pass.`,
                  );
                  return;
                }
              }

              core.info("Waiting for Bugbot to respond...");
              await sleep(POLL_INTERVAL_MS);
            }

            if (isStrict) {
              core.setFailed("Timed out waiting for Bugbot to report on a strict branch.");
              return;
            }
            core.warning(
              "Timed out waiting for Bugbot on advisory branch — not failing. Check the Bugbot dashboard if this persists.",
            );
