name: Trigger Bugbot Review

on:
  pull_request_target:
    branches: [main, production]
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  checks: read
  pull-requests: write

jobs:
  bugbot-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request and verify Bugbot review
        uses: actions/github-script@v8
        with:
          script: |
            const bugbotTriggerComment = "cursor review";
            const workflowCheckName = "bugbot-review";
            const pollIntervalMs = 15000;
            const pollTimeoutMs = 10 * 60 * 1000;
            const bugbotNamePattern = /(bugbot|cursor)/i;
            const bugbotAppPattern = /cursor/i;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            function isBugbotCheckRun(checkRun) {
              if (checkRun.name === workflowCheckName) {
                return false;
              }

              const appSlug = checkRun.app?.slug ?? "";
              const appName = checkRun.app?.name ?? "";

              return (
                bugbotNamePattern.test(checkRun.name) ||
                bugbotAppPattern.test(appSlug) ||
                bugbotAppPattern.test(appName)
              );
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: bugbotTriggerComment,
            });

            const startedAt = Date.now();
            const headSha = context.payload.pull_request.head.sha;

            while (Date.now() - startedAt < pollTimeoutMs) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100,
              });

              const bugbotRuns = data.check_runs.filter(isBugbotCheckRun);

              if (bugbotRuns.length === 0) {
                core.info("Waiting for Bugbot to report a check run...");
                await sleep(pollIntervalMs);
                continue;
              }

              const incompleteRun = bugbotRuns.find((run) => run.status !== "completed");
              if (incompleteRun) {
                core.info(`Bugbot check '${incompleteRun.name}' is still ${incompleteRun.status}.`);
                await sleep(pollIntervalMs);
                continue;
              }

              const latestCompletedRun = [...bugbotRuns].sort((left, right) => {
                const leftTimestamp = new Date(left.completed_at ?? left.started_at ?? 0).getTime();
                const rightTimestamp = new Date(right.completed_at ?? right.started_at ?? 0).getTime();
                return rightTimestamp - leftTimestamp;
              })[0];

              core.info(`Bugbot check '${latestCompletedRun.name}' completed with conclusion '${latestCompletedRun.conclusion}'.`);

              if (["success", "neutral", "skipped"].includes(latestCompletedRun.conclusion ?? "")) {
                return;
              }

              core.setFailed(
                `Bugbot check '${latestCompletedRun.name}' completed with conclusion '${latestCompletedRun.conclusion ?? "unknown"}'.`,
              );
              return;
            }

            core.setFailed("Timed out waiting for Bugbot to report a completed check run.");
