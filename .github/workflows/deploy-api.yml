name: Deploy API

# Triggered ONLY after CI workflow completes successfully.
# This ensures broken code never deploys.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, preview]

jobs:
  # ── Check if API-related files changed ──────────────────────────────────
  check-changes:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      api-changed: ${{ steps.filter.outputs.api-changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for API-related changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -qE '^(apps/api/|packages/validation/|packages/typescript-config/|supabase/migrations/)'; then
            echo "api-changed=true" >> "$GITHUB_OUTPUT"
            echo "API-related files changed — deploy will proceed."
          else
            echo "api-changed=false" >> "$GITHUB_OUTPUT"
            echo "No API-related files changed — skipping deploy."
          fi

  # ── Deploy to staging ───────────────────────────────────────────────────
  deploy-staging:
    needs: check-changes
    if: |
      needs.check-changes.outputs.api-changed == 'true' &&
      github.event.workflow_run.head_branch == 'preview'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger Render staging deploy
        if: env.RENDER_DEPLOY_HOOK_URL_STAGING != ''
        env:
          RENDER_DEPLOY_HOOK_URL_STAGING: ${{ secrets.RENDER_DEPLOY_HOOK_URL_STAGING }}
        run: |
          echo "Triggering Render staging deploy..."
          curl -sf "$RENDER_DEPLOY_HOOK_URL_STAGING" || echo "::warning::Render deploy hook failed or not configured"

      - name: Wait for deploy to start
        run: sleep 10

      - name: Staging health smoke check
        if: env.API_STAGING_HEALTHCHECK_URL != ''
        env:
          API_STAGING_HEALTHCHECK_URL: ${{ secrets.API_STAGING_HEALTHCHECK_URL }}
        run: |
          echo "Waiting for staging API to become healthy..."
          for i in 1 2 3 4 5; do
            if curl -fsSL "$API_STAGING_HEALTHCHECK_URL" >/dev/null 2>&1; then
              echo "Staging API is healthy."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::warning::Staging health check did not pass after 5 attempts."

  # ── Deploy to production ────────────────────────────────────────────────
  deploy-production:
    needs: check-changes
    if: |
      needs.check-changes.outputs.api-changed == 'true' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render production deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render production deploy..."
          curl -sf "$RENDER_DEPLOY_HOOK_URL" || echo "::warning::Render deploy hook failed or not configured"

      - name: Wait for deploy to start
        run: sleep 10

      - name: Production health smoke check
        if: env.API_PRODUCTION_HEALTHCHECK_URL != ''
        env:
          API_PRODUCTION_HEALTHCHECK_URL: ${{ secrets.API_PRODUCTION_HEALTHCHECK_URL }}
        run: |
          echo "Waiting for production API to become healthy..."
          for i in 1 2 3 4 5; do
            if curl -fsSL "$API_PRODUCTION_HEALTHCHECK_URL" >/dev/null 2>&1; then
              echo "Production API is healthy."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "::warning::Production health check did not pass after 5 attempts."

  # ── Skip notification (CI failed) ──────────────────────────────────────
  skip-on-failure:
    if: github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    steps:
      - name: CI did not pass
        run: |
          echo "CI workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Skipping deploy — CI must pass before deployments are triggered."
