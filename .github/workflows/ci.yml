name: CI

on:
  pull_request:
    branches: [main, preview]
  push:
    branches: [main, preview]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check migration safety (PR)
        if: github.event_name == 'pull_request'
        run: npm run check:migration-safety -- --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"

      - name: Check migration safety (push)
        if: github.event_name == 'push'
        run: npm run check:migration-safety

      - name: Build packages
        run: npx turbo run build --filter='./packages/*'

      - name: Type check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Test (API)
        run: npm run test -w apps/api

      - name: Check API contract drift
        run: npm run check:api-contract

  build:
    needs: lint-typecheck-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://placeholder.api/v1
          NEXT_PUBLIC_APP_URL: http://placeholder.app
