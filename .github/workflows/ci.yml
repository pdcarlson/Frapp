name: CI

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, production]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Domain-specific parallel jobs. Each is an independent required status check.
# The `packages-build` job runs first (shared dependency), then all others
# run in parallel.
# ---------------------------------------------------------------------------

jobs:
  # ── Shared packages build (dependency for downstream jobs) ──────────────
  packages-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter='./packages/*'

  # ── Lint + type check (full monorepo) ───────────────────────────────────
  lint-and-typecheck:
    needs: packages-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter='./packages/*'

      - name: Type check
        run: npm run check-types

      - name: Lint
        run: npm run lint

  # ── API unit tests ──────────────────────────────────────────────────────
  api-tests:
    needs: packages-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter='./packages/*'

      - name: Run API tests
        run: npm run test -w apps/api

  # ── API contract freshness check ────────────────────────────────────────
  api-contract-check:
    needs: packages-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API contract freshness (PR)
        if: github.event_name == 'pull_request'
        run: npm run check:api-contract -- --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"

      - name: Check API contract freshness (push)
        if: github.event_name == 'push'
        run: npm run check:api-contract

  # ── Migration safety ────────────────────────────────────────────────────
  migration-safety:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check migration safety (PR)
        if: github.event_name == 'pull_request'
        run: npm run check:migration-safety -- --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"

      - name: Check migration safety (push)
        if: github.event_name == 'push'
        run: npm run check:migration-safety

  # ── Mobile app validation ───────────────────────────────────────────────
  mobile-validate:
    needs: packages-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter='./packages/*'

      - name: Lint mobile
        run: npm run lint -w apps/mobile

      - name: Type check mobile
        run: npm run check-types -w apps/mobile

  # ── Web visual regression snapshots ─────────────────────────────────────
  web-visual-regression:
    needs: packages-build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo run build --filter='./packages/*'

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run dashboard visual regression suite
        run: npm run test:visual -w apps/web

  # ── Branch policy enforcement (PRs to production only) ─────────────────
  branch-policy:
    if: github.event_name == 'pull_request' && github.base_ref == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main-to-production policy
        env:
          SOURCE_BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$SOURCE_BRANCH" != "main" ]]; then
            echo "::error::PRs targeting production must come from the main branch. Source: $SOURCE_BRANCH"
            exit 1
          fi
          echo "Branch policy check passed: main → production"
